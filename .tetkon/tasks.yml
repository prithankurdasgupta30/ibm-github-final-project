apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  workspaces:
    - name: source
  steps:
    - name: cleanup
      image: python:3.11-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        rm -rf .pytest_cache
        rm -rf __pycache__
        find . -name "*.pyc" -delete
        find . -name "*.pyo" -delete
---
apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: test
spec:
  workspaces:
    - name: source
  steps:
    - name: install
      image: python:3.11-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: lint
      image: python:3.11-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        flake8 service tests

    - name: unit-test
      image: python:3.11-slim
      workingDir: $(workspaces.source.path)
      env:
        - name: DATABASE_URI
          value: sqlite:///test.db
      script: |
        #!/bin/sh
        nosetests -v --with-spec --spec-color
